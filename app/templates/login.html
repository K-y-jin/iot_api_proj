{% extends "base.html" %}
{% block title %}로그인 · IoT 데이터 수집{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>로그인</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>아이디 <input name="username" required autofocus /></label>
    <label>비밀번호 <input name="password" type="password" required /></label>
    <button type="submit">로그인</button>
  </form>
  <p class="muted">계정 발급은 관리자에게 문의하세요.</p>
</section>
{% endblock %}
